appId: com.pettato.desktop
productName: petTaTo
copyright: Copyright © petTaTo

directories:
  buildResources: build
  output: dist

# Bundle only the compiled output + runtime deps.
files:
  - out/**/*
  - package.json
  - '!**/*.map'

# sql.js' WebAssembly binary must sit outside the asar so it can be read at runtime.
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

asarUnpack:
  - '**/*.wasm'

# ---------------- Linux ----------------
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  icon: build/icon.png
  maintainer: petTaTo <noreply@pettato.local>
  desktop:
    Name: petTaTo
    Comment: Desktop virtual pet
    Categories: Utility;Game;

# ---------------- Windows ----------------
win:
  target:
    - nsis
    - msi
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ---------------- macOS ----------------
mac:
  target:
    - dmg
  category: public.app-category.entertainment
  icon: build/icon.png
  hardenedRuntime: true

dmg:
  title: petTaTo
